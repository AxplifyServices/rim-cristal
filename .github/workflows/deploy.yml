name: Deploy Casa Luxury Decor

on:
  push:
    branches:
      - main

concurrency:
  group: casaluxurydecor-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Casa Luxury Decor
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          command_timeout: 30m
          script: |
            set -Eeuo pipefail

            PROJECT_DIRECTORY="/opt/apps/rim_cristal"
            COMPOSE_FILE="docker-compose.prod.yml"
            ENV_FILE=".env.prod"

            echo "===== Open project directory ====="
            cd "$PROJECT_DIRECTORY"

            echo "===== Fetch latest code ====="
            git fetch origin main
            git reset --hard origin/main

            echo "===== Verify production environment ====="
            test -f "$ENV_FILE"

            echo "===== Validate Docker Compose configuration ====="
            docker compose \
              --env-file "$ENV_FILE" \
              -f "$COMPOSE_FILE" \
              config --quiet

            echo "===== Build application images ====="
            docker compose \
              --env-file "$ENV_FILE" \
              -f "$COMPOSE_FILE" \
              build \
              casaluxurydecor-backend \
              casaluxurydecor-frontend

            echo "===== Start MinIO ====="
            docker compose \
              --env-file "$ENV_FILE" \
              -f "$COMPOSE_FILE" \
              up -d casaluxurydecor-minio

            echo "===== Wait for MinIO health ====="
            for attempt in $(seq 1 30); do
              STATUS="$(docker inspect \
                --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' \
                casaluxurydecor-minio 2>/dev/null || true)"

              echo "MinIO health: $STATUS"

              if [ "$STATUS" = "healthy" ]; then
                break
              fi

              if [ "$attempt" -eq 30 ]; then
                echo "MinIO did not become healthy."
                docker logs casaluxurydecor-minio --tail 200
                exit 1
              fi

              sleep 5
            done

            echo "===== Initialize MinIO bucket and permissions ====="
            docker compose \
              --env-file "$ENV_FILE" \
              -f "$COMPOSE_FILE" \
              run --rm casaluxurydecor-minio-init

            echo "===== Start complete application ====="
            docker compose \
              --env-file "$ENV_FILE" \
              -f "$COMPOSE_FILE" \
              up -d --remove-orphans \
              casaluxurydecor-backend \
              casaluxurydecor-frontend

            echo "===== Container status ====="
            docker compose \
              --env-file "$ENV_FILE" \
              -f "$COMPOSE_FILE" \
              ps

            echo "===== Backend logs ====="
            docker logs casaluxurydecor-backend --tail 50

            echo "===== Frontend logs ====="
            docker logs casaluxurydecor-frontend --tail 50

            echo "===== Cleanup unused Docker images ====="
            docker image prune -f