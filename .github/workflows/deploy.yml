name: Deploy Casa Luxury Decor

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Casa Luxury Decor
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            set -e

            echo "===== Go to Casa Luxury Decor folder ====="
            cd /opt/apps/rim_cristal

            echo "===== Fetch latest code ====="
            git fetch origin main
            git reset --hard origin/main

            echo "===== Check production environment ====="
            test -f .env.prod

            echo "===== Start MinIO first ====="
            docker compose \
              --env-file .env.prod \
              -f docker-compose.prod.yml \
              up -d \
              casaluxurydecor-minio \
              casaluxurydecor-minio-init

            echo "===== Build and restart application ====="
            docker compose \
              --env-file .env.prod \
              -f docker-compose.prod.yml \
              up -d --build

            echo "===== Cleanup unused Docker images ====="
            docker image prune -f

            echo "===== Container status ====="
            docker compose \
              --env-file .env.prod \
              -f docker-compose.prod.yml \
              ps